<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JATA SNAKE RUNNER</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#0a0a12;overflow:hidden;}
  body{display:flex;align-items:center;justify-content:center;
    font-family:'Press Start 2P',monospace;color:#f4d8a8;
    touch-action:none;-webkit-user-select:none;user-select:none;}
  #wrap{position:relative;width:100vw;max-width:1000px;aspect-ratio:16/9;
    box-shadow:0 0 0 4px #000,0 0 0 9px #2a2a3a,0 18px 50px rgba(0,0,0,.6);background:#000;}
  canvas{display:block;width:100%;height:100%;image-rendering:pixelated;background:#000;}
  #scan{position:absolute;inset:0;pointer-events:none;z-index:5;
    background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0,rgba(0,0,0,0) 2px,rgba(0,0,0,.18) 3px);
    mix-blend-mode:multiply;}
  .screen{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;gap:18px;
    background:rgba(8,6,14,.82);padding:20px;}
  .hidden{display:none!important;}
  .title{font-size:clamp(18px,4.2vw,40px);color:#e8843a;
    text-shadow:3px 3px 0 #c8492c,6px 6px 0 #000;letter-spacing:1px;line-height:1.5;}
  .sub{font-size:clamp(8px,1.7vw,13px);color:#f4d8a8;line-height:2;}
  .small{font-size:clamp(7px,1.4vw,11px);color:#9aa;line-height:2;}
  .btn{font-family:inherit;font-size:clamp(9px,2vw,15px);color:#1a1414;background:#e8843a;
    border:none;padding:14px 26px;cursor:pointer;box-shadow:4px 4px 0 #000;transition:transform .05s;}
  .btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 #000;}
  #muteBtn{position:absolute;top:5px;left:6px;width:30px;height:30px;z-index:12;
    display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;
    background:rgba(0,0,0,.45);border:2px solid rgba(244,216,168,.5);border-radius:8px;}
  #pad{position:absolute;inset:0;z-index:8;pointer-events:none;}
  .tbtn{position:absolute;bottom:14px;width:74px;height:74px;border-radius:50%;
    background:rgba(244,216,168,.18);border:3px solid rgba(244,216,168,.45);
    display:flex;align-items:center;justify-content:center;font-size:26px;color:#f4d8a8;pointer-events:auto;}
  #bL{left:14px;}#bR{left:100px;}#bJ{right:14px;background:rgba(232,132,58,.3);border-color:rgba(232,132,58,.7);}
  #endScreen{gap:14px;}
  #endShell{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(250px,.75fr);gap:16px;width:min(920px,100%);align-items:stretch;}
  .result-media{position:relative;min-height:240px;background:#05050b;border:4px solid #000;box-shadow:4px 4px 0 #000;overflow:hidden;}
  .result-media video,.result-media canvas,.result-media img{display:block;width:100%;height:100%;object-fit:cover;background:#05050b;}
  .result-media canvas{image-rendering:pixelated;}
  .result-panel{display:flex;flex-direction:column;justify-content:center;align-items:center;gap:14px;min-height:240px;padding:18px;background:rgba(15,10,20,.92);border:4px solid #000;box-shadow:4px 4px 0 #000;}
  .result-panel .title{font-size:clamp(20px,4vw,38px);line-height:1.3;}
  .result-panel .sub{font-size:clamp(8px,1.6vw,13px);}
  .result-badge{position:absolute;top:10px;left:10px;z-index:2;display:inline-flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(0,0,0,.55);border:2px solid rgba(244,216,168,.35);font-size:10px;line-height:1.4;color:#f4d8a8;}
  .result-badge span{display:block;}
  @media(max-width:780px){
    #endShell{grid-template-columns:1fr;}
    .result-media{min-height:190px;}
    .result-panel{min-height:auto;}
  }
  @media(hover:hover){#pad{display:none;}}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv" width="480" height="270"></canvas>
  <div id="scan"></div>
  <div id="muteBtn">🔊</div>
  <div id="pad">
    <div class="tbtn" id="bL">&#9664;</div>
    <div class="tbtn" id="bR">&#9654;</div>
    <div class="tbtn" id="bJ">&#10548;</div>
  </div>
  <div class="screen" id="titleScreen">
    <div class="title">JATA<br>SNAKE RUNNER</div>
    <div class="sub">コーンスネークが世界を旅する<br>&#128045;を食べて伸びろ／全5ステージ＋ボス</div>
    <div class="small">PC：&larr; &rarr; 移動／SPACE・&uarr; ジャンプ<br>敵を踏んだ瞬間にジャンプで高く飛べる！<br>&#128045;10匹でスタミナ回復・満タンで残機UP</div>
    <button class="btn" id="startBtn">START</button>
  </div>
  <div class="screen hidden" id="interScreen">
    <div class="title" id="interTitle">STAGE CLEAR</div>
    <div class="sub" id="interSub"></div>
    <button class="btn" id="nextBtn">NEXT</button>
  </div>
  <div class="screen hidden" id="endScreen">
    <div id="endShell">
      <div class="result-media">
        <div class="result-badge" id="endBadge"><span id="endBadgeTitle">GAME OVER</span></div>
        <video id="clearVideo" muted loop playsinline preload="auto" class="hidden"></video>
        <img id="deathPortrait" alt="GAME OVER portrait">
      </div>
      <div class="result-panel">
        <div class="title" id="endTitle">GAME OVER</div>
        <div class="sub" id="endMsg"></div>
        <button class="btn" id="againBtn">RETRY</button>
      </div>
    </div>
  </div>
</div>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;
const W=480,H=270,GROUND_Y=222;
const ASSET_VERSION='20260606-1';
const ASSET_BASE=location.pathname.endsWith('/')?location.pathname:`${location.pathname}/`;
const asset=path=>`${new URL(path, location.origin+ASSET_BASE).pathname}?v=${ASSET_VERSION}`;

clearVideo.src=asset('assets/ending/gemini-clear.mp4');
clearVideo.poster=asset('assets/ending/gemini-clear-poster.jpg');

snakeHeadImg.src=asset('assets/snake-head.png');

bossDragonImg.src=asset('assets/boss-dragon.png');

  const img=new Image();

});
const ENEMY_ART_DEFS={

  grasshopper2:['assets/enemies/grasshopper-2.png',30,20],

  pandaSamurai:['assets/enemies/panda-samurai.png',24,34],
  spiderRed:['assets/enemies/spider-red.png',26,26],

for(const [key,[src,w,h]] of Object.entries(ENEMY_ART_DEFS)){

const ENEMY_FALLBACK={ghost:'\uD83D\uDC7B',ninja:'\uD83E\uDD77',scorp:'\uD83E\uDD82',cobra:'\uD83D\uDC0D',hop:'\uD83D\uDC26',walk:'\uD83D\uDFEA'};
const BG_LAYER_NAMES=['sky','mid','front'];
const stageBgImgs=[1,2,3,4,5].map(n=>BG_LAYER_NAMES.map(name=>{

stage1UserSkyImg.src=asset('assets/stage1-sun-plane-teru.png');

stage1SeaWashImg.src=asset('assets/stage1-sea-only-teru.png');

stage3VillageFrontImg.src=asset('assets/stage3-village-front-seamless-v2.png');

stage4SunsetSkyImg.src=asset('assets/stage4-sunset-sun-teru.png');
const stage4DesertFrontImg=new Image();
stage4DesertFrontImg.src=asset('assets/stage4-desert-front-teru.png');
const BG_LAYERS=[
  [{name:'sky',speed:0.01,alpha:1},{name:'mid',speed:0.12,alpha:1},{name:'front',speed:0.42,alpha:1}],
  [{name:'sky',speed:0.006,alpha:1},{name:'mid',speed:0.08,alpha:1},{name:'front',speed:0.30,alpha:1}],
  [{name:'sky',speed:0.01,alpha:1}],
  [{name:'sky',speed:0.008,alpha:1},{name:'mid',speed:0.11,alpha:1},{name:'front',speed:0.38,alpha:1}],
  [{name:'sky',speed:0.008,alpha:1},{name:'mid',speed:0.13,alpha:1},{name:'front',speed:0.44,alpha:1}],

const GRAVITY=0.48, JUMP_V=-10.8, MOVE_A=0.9, MOVE_MAX=2.85, FRICTION=0.78, MAX_FALL=10.5;
const UPDATE_STEP_MS=1000/60, MAX_UPDATE_STEPS=4;
const COYOTE_FRAMES=8, JUMP_BUFFER_FRAMES=10;
const HEAD_R=9, SEG_R=7, SEG_SPACING=7, BASE_SEG=3;
const STOMP_SMALL=-7.0, STOMP_BIG=-11.8;
const STAMINA_MAX=3, FEED_HEAL=10;
const BOSS_HP=3;

const STAGES=[
  { name:'STAGE 1', sub:'GRASSLAND ― 草原', sky:['#7ec8ff','#bfe9ff'], ground:'#5aa84e', soil:'#3a7a32', deco:'cloud',
    goalX:2200, gimmick:'none', cps:[60,1150],
    hills:[{x:300,w:140,h:30}],
    pits:[{x:560,w:64},{x:1500,w:66},{x:1820,w:150}],
    plats:[{x:760,y:165,w:80,h:10,type:'solid'},{x:1180,y:158,w:80,h:10,type:'solid'}],
    spikes:[{x:1300,y:GROUND_Y-12,w:24}],
    mice:[{x:480,y:GROUND_Y-14},{x:790,y:150},{x:1210,y:148},{x:1650,y:GROUND_Y-14},{x:2050,y:GROUND_Y-14}],
    enemies:[{x:1000,y:GROUND_Y-14,type:'walk',art:'grasshopper1'},{x:1895,y:GROUND_Y-40,type:'hop',art:'eagle'}] },

  { name:'STAGE 2', sub:'GRAVEYARD ― 墓場（夜）', sky:['#1a1438','#3a2a5a'], ground:'#4a4458', soil:'#2a2438', deco:'grave',
    goalX:2500, gimmick:'none', cps:[60,1250],
    hills:[],
    pits:[{x:700,w:300},{x:1500,w:66},{x:1900,w:150}],
    plats:[{x:710,y:GROUND_Y,w:58,h:8,type:'island'},{x:808,y:GROUND_Y,w:58,h:8,type:'island'},{x:906,y:GROUND_Y,w:58,h:8,type:'island'},
           {x:1180,y:155,w:80,h:10,type:'solid'}],
    spikes:[{x:1300,y:GROUND_Y-12,w:36},{x:1700,y:GROUND_Y-12,w:24}],
    mice:[{x:430,y:GROUND_Y-14},{x:825,y:GROUND_Y-24},{x:1210,y:142},{x:1600,y:GROUND_Y-14},{x:2150,y:GROUND_Y-14}],
    enemies:[{x:1100,y:GROUND_Y-14,type:'ghost',art:'spiderWhite'},{x:1400,y:GROUND_Y-14,type:'ghost',art:'spiderRed'},{x:1975,y:GROUND_Y-42,type:'hop',art:'owl1'}] },

  { name:'STAGE 3', sub:'NINJA CASTLE ― 忍者の城', sky:['#c84a2c','#f0a060'], ground:'#7a4a30', soil:'#4a2a18', deco:'castle',
    goalX:2700, gimmick:'none', cps:[60,1350],
    hills:[{x:1050,w:120,h:34}],
    pits:[{x:760,w:70},{x:1500,w:70},{x:2000,w:150}],
    plats:[{x:560,y:170,w:70,h:10,type:'move',range:55,axis:'y'},
           {x:1250,y:150,w:80,h:10,type:'move',range:80,axis:'x'},
           {x:1700,y:160,w:70,h:10,type:'solid'},
           {x:2350,y:158,w:80,h:10,type:'solid'}],
    spikes:[{x:1380,y:GROUND_Y-12,w:36}],
    mice:[{x:430,y:GROUND_Y-14},{x:1270,y:140},{x:1720,y:148},{x:2370,y:146},{x:2500,y:GROUND_Y-14}],
    enemies:[{x:900,y:GROUND_Y-14,type:'ninja',art:'ninjaDuo'},{x:1750,y:GROUND_Y-14,type:'ninja',art:'pandaRonin'},{x:2075,y:GROUND_Y-42,type:'hop',art:'bee'}] },

  { name:'STAGE 4', sub:'DESERT RUINS ― 砂漠の遺跡', sky:['#e8b85a','#f4e0a0'], ground:'#c89858', soil:'#9a7038', deco:'pyramid',
    goalX:2800, gimmick:'none', cps:[60,1450],
    hills:[],
    pits:[{x:600,w:260},{x:1300,w:66},{x:1700,w:150},{x:2300,w:64}],
    plats:[{x:640,y:GROUND_Y-2,w:42,h:10,type:'crumble'},{x:730,y:GROUND_Y-2,w:42,h:10,type:'crumble'},{x:820,y:GROUND_Y-2,w:42,h:10,type:'crumble'},
           {x:1120,y:158,w:70,h:10,type:'solid'},{x:2050,y:160,w:70,h:10,type:'solid'}],
    spikes:[{x:1150,y:GROUND_Y-12,w:36},{x:2150,y:GROUND_Y-12,w:36}],
    mice:[{x:430,y:GROUND_Y-14},{x:735,y:GROUND_Y-24},{x:1150,y:146},{x:1500,y:GROUND_Y-14},{x:2070,y:146},{x:2600,y:GROUND_Y-14}],
    enemies:[{x:1200,y:GROUND_Y-14,type:'scorp',art:'mantis'},{x:1775,y:GROUND_Y-42,type:'hop',art:'vulture'},{x:2450,y:GROUND_Y-14,type:'cobra',art:'spiderYellow'}] },

  { name:'STAGE 5', sub:'VOLCANO ― 火山（最終面）', sky:['#3a0a0a','#8a2a1a'], ground:'#5a2a20', soil:'#3a1810', deco:'volcano',
    goalX:99999, gimmick:'lava_rise', cps:[60,1500,2350], boss:true, bossX:2500,
    hills:[{x:350,w:130,h:32}],
    pits:[{x:600,w:64},{x:1000,w:150},{x:1600,w:66},{x:2100,w:150}],
    plats:[{x:780,y:160,w:70,h:10,type:'solid'},{x:1300,y:155,w:70,h:10,type:'move',range:55,axis:'y'},
           {x:1800,y:160,w:70,h:10,type:'solid'},{x:2450,y:158,w:80,h:10,type:'solid'}],
    spikes:[{x:1450,y:GROUND_Y-12,w:36},{x:1900,y:GROUND_Y-12,w:24}],
    mice:[{x:250,y:GROUND_Y-14},{x:810,y:146},{x:1320,y:142},{x:1830,y:146},{x:2470,y:146}],
    enemies:[{x:1075,y:GROUND_Y-42,type:'hop',art:'wasp'},{x:1500,y:GROUND_Y-14,type:'scorp',art:'spiderRed'},{x:2175,y:GROUND_Y-42,type:'hop',art:'owl2'}] },
];

let stageIdx=0, score=0, eaten=0, lives=3, stamina=3, feed=0, running=false;
let head, trail, camX, invuln, st, ents, mice, rocks, shots, lavaY, rockTimer, lastCPx;
let bossActive=false, arenaLeft=0, rightWall=0, boss=null, fires=[], bossSpikes=[];

function groundTop(x){ let t=GROUND_Y; for(const h of st.hills) if(x>h.x&&x<h.x+h.w) t=Math.min(t,GROUND_Y-h.h); return t; }
function overGround(x){ if(bossActive)return true; for(const p of st.pits) if(x>p.x&&x<p.x+p.w) return false; return true; }
function spawnEnts(){ ents=st.enemies.map(e=>({x:e.x,y:e.y,type:e.type,em:e.em,art:e.art,ox:e.x,dir:-1,alive:true,t:Math.random()*60,dispY:0})); }

function loadStage(i){
  const s=STAGES[i];
  st={...s, hills:s.hills||[], plats:(s.plats||[]).map(p=>({...p,broken:false,timer:0,base:(p.axis==='x'?p.x:p.y),ph:Math.random()*6.28}))};
  lastCPx=s.cps[0];
  head={x:60,y:groundTop(60)-HEAD_R,vx:0,vy:0,onGround:true,face:1};
  trail=[]; for(let k=0;k<240;k++)trail.push({x:head.x,y:head.y});
  camX=0; invuln=0; stamina=STAMINA_MAX;
  spawnEnts();
  mice=s.mice.map((m,idx)=>({x:m.x,y:m.y,got:false,bob:Math.random()*6.28,variant:idx%mouseImgs.length}));
  rocks=[]; shots=[]; lavaY=H+50; rockTimer=0;
  bossActive=false; arenaLeft=0; rightWall=0; boss=null; fires=[]; bossSpikes=[];
}

const key={left:false,right:false,jump:false};
let jumpHeld=false, coyoteFrames=0, jumpBufferFrames=0;
addEventListener('keydown',e=>{
  if(['ArrowLeft','a','A'].includes(e.key))key.left=true;
  if(['ArrowRight','d','D'].includes(e.key))key.right=true;
  if([' ','ArrowUp','w','W'].includes(e.key)){key.jump=true;e.preventDefault();}
});
addEventListener('keyup',e=>{
  if(['ArrowLeft','a','A'].includes(e.key))key.left=false;
  if(['ArrowRight','d','D'].includes(e.key))key.right=false;
  if([' ','ArrowUp','w','W'].includes(e.key))key.jump=false;
});
function bind(id,k){const el=document.getElementById(id);
  const on=e=>{e.preventDefault();key[k]=true;};const off=e=>{e.preventDefault();key[k]=false;};
  el.addEventListener('touchstart',on,{passive:false});el.addEventListener('touchend',off);
  el.addEventListener('mousedown',on);el.addEventListener('mouseup',off);el.addEventListener('mouseleave',off);}
bind('bL','left');bind('bR','right');bind('bJ','jump');

let actx=null, master=null, muted=false;
function audioInit(){ if(actx)return; try{ actx=new (window.AudioContext||window.webkitAudioContext)();
  master=actx.createGain(); master.gain.value=0.22; master.connect(actx.destination);}catch(e){actx=null;} }
function audioResume(){ if(actx&&actx.state==='suspended')actx.resume(); }
function beep(freq,dur,type,vol,when){ if(!actx||muted||!freq)return;
  const t=when||actx.currentTime; const o=actx.createOscillator(),g=actx.createGain();
  o.type=type||'square'; o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol||0.3,t+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.connect(g);g.connect(master);
  o.start(t);o.stop(t+dur+0.03); }
function seq(arr,gap,type,vol){ if(!actx)return; const t=actx.currentTime;
  arr.forEach((f,i)=>beep(f,gap*0.9,type||'square',vol||0.3,t+i*gap)); }
const sfxJump =()=>{ if(!actx)return; const t=actx.currentTime; beep(440,0.07,'square',0.3,t); beep(660,0.08,'square',0.26,t+0.05); };
const sfxStomp=()=>{ if(!actx)return; const t=actx.currentTime; beep(300,0.05,'square',0.32,t); beep(520,0.1,'square',0.28,t+0.045); };
const sfxEat  =()=>{ if(!actx)return; const t=actx.currentTime; beep(880,0.05,'square',0.3,t); beep(1320,0.07,'square',0.26,t+0.05); };
const sfxHeal =()=>seq([523,659,784,1047],0.07,'square',0.28);
const sfxHurt =()=>{ if(!actx)return; const t=actx.currentTime; beep(220,0.16,'sawtooth',0.3,t); beep(150,0.2,'sawtooth',0.27,t+0.11); };
const sfxLose =()=>{ if(!actx)return; const t=actx.currentTime; beep(140,0.14,'sawtooth',0.22,t); beep(104,0.16,'triangle',0.16,t+0.07); beep(78,0.18,'square',0.1,t+0.12); };
const sfxBoss =()=>{ if(!actx)return; const t=actx.currentTime; beep(170,0.12,'square',0.34,t); beep(120,0.18,'sawtooth',0.3,t+0.08); };
const sfxClear=()=>seq([523,659,784,1047,1319],0.1,'square',0.3);
const sfxOver =()=>seq([392,330,262,196],0.16,'square',0.3);
const BGM_MAIN={step:0.15, lead:[392,0,523,0,659,0,523,0,587,0,494,0,523,0,659,0],

  lavaY=H+60;

function breatheFire(){
  const dir=head.x<boss.x?-1:1;
  const mouthX=boss.x+(dir<0?-50:44);
  const mouthY=boss.y-30;
  for(let i=0;i<2;i++) fires.push({x:mouthX+dir*i*6,y:mouthY+i*3,vx:dir*(2.3+i*0.5),vy:-0.7+i*0.5});
}
function updateBoss(){
  const b=boss; b.timer++; if(b.iframe>0)b.iframe--;
  if(b.dead){ b.y+=2.2; b.dead++; if(b.dead>70){running=false;stageClear();} return; }
  if(b.state==='intro'){ if(b.timer>50){b.state='hover';b.timer=0;} }
  else if(b.state==='hover'){
    b.y=b.baseY+Math.sin(b.timer*0.05)*10; b.low=false;
    if(b.timer===1) b.fireBursts=1+Math.floor(Math.random()*2);
    b.fireT++;
    if(b.fireT>90){
      b.fireT=0;
      breatheFire();
      b.fireBursts--;
      if(b.fireBursts<=0){ b.state='swoop'; b.timer=0; b.fireT=0; }
    }
  }
  else if(b.state==='swoop'){
    const lowY=GROUND_Y-26;
    if(b.timer<35){ b.y+=(lowY-b.y)*0.12; b.low=false; }
    else if(b.timer<110){ b.y=lowY; b.low=true; }
    else { b.y+=(b.baseY-b.y)*0.1; b.low=false; if(b.timer>170){b.state='hover';b.timer=0;b.fireT=0;b.fireBursts=1+Math.floor(Math.random()*2);} }
  }
  const bw=32,bh=30;
  if(Math.abs(b.x-head.x)<bw&&Math.abs(b.y-head.y)<bh){
    if(head.vy>1&&head.y<b.y-4&&b.iframe<=0&&b.low){
      b.hp--; b.iframe=70; head.vy=STOMP_BIG; head.y=b.y-bh; score+=300; sfxBoss();
      if(b.hp<=0){b.dead=1;} else {b.state='swoop';b.timer=120;}
    } else if(b.iframe<=0) hurt();
  }
  for(const f of fires){ f.x+=f.vx; f.y+=f.vy; f.vy+=0.045;
    if(Math.abs(f.x-head.x)<HEAD_R+6&&Math.abs(f.y-head.y)<HEAD_R+6){hurt();f.dead=true;} }
  fires=fires.filter(f=>!f.dead&&f.x>arenaLeft-20&&f.x<arenaLeft+W+20&&f.y<H+10);
}

function update(){
  if(!running)return;
  if(key.left){head.vx-=MOVE_A;head.face=-1;}
  if(key.right){head.vx+=MOVE_A;head.face=1;}
  head.vx=Math.max(-MOVE_MAX,Math.min(MOVE_MAX,head.vx));
  if(!key.left&&!key.right)head.vx*=FRICTION;
  if(key.jump&&!jumpHeld)jumpBufferFrames=JUMP_BUFFER_FRAMES;
  if(head.onGround)coyoteFrames=COYOTE_FRAMES; else if(coyoteFrames>0)coyoteFrames--;
  if(jumpBufferFrames>0)jumpBufferFrames--;
  if(jumpBufferFrames>0&&coyoteFrames>0){
    head.vy=JUMP_V;head.onGround=false;coyoteFrames=0;jumpBufferFrames=0;sfxJump();
  }
  jumpHeld=key.jump;
  head.vy=Math.min(MAX_FALL,head.vy+GRAVITY);
  head.x+=head.vx; head.y+=head.vy;
  if(head.x<HEAD_R)head.x=HEAD_R;
  if(bossActive){ if(head.x<arenaLeft+HEAD_R)head.x=arenaLeft+HEAD_R; if(head.x>rightWall){head.x=rightWall;if(head.vx>0)head.vx=0;} }

  head.onGround=false;
  for(const p of st.plats){
    if(p.broken)continue;
    let px=p.x,py=p.y;
    if(p.type==='move'){p.ph+=0.03; if(p.axis==='x'){px=p.base+Math.sin(p.ph)*p.range;p.x=px;}else{py=p.base+Math.sin(p.ph)*p.range;p.y=py;}}
    if(head.x>px-2&&head.x<px+p.w+2&&head.vy>=0&&head.y+HEAD_R>=py&&head.y+HEAD_R<=py+p.h+12){
      head.y=py-HEAD_R;head.vy=0;head.onGround=true;
      if(p.type==='crumble'){p.timer++;if(p.timer>32)p.broken=true;}
    }
  }
  const gt=groundTop(head.x);
  if(head.y+HEAD_R>=gt&&overGround(head.x)){head.y=gt-HEAD_R;head.vy=0;head.onGround=true;}
  for(const c of st.cps) if(head.x>c&&c>lastCPx) lastCPx=c;
  if(head.y>H+30){fall();return;}

  trail.unshift({x:head.x,y:head.y}); trail.pop();
  const segCount=BASE_SEG+eaten;

  for(const m of mice){ if(m.got)continue; m.bob+=0.08;
    if(Math.abs(m.x-head.x)<HEAD_R+8&&Math.abs(m.y-head.y)<HEAD_R+8){m.got=true;feedMouse();sfxEat();} }

  if(!bossActive)for(const e of ents){ if(!e.alive)continue; e.t++;
    if(e.type==='walk'||e.type==='scorp'||e.type==='cobra'){
      const sp=e.type==='scorp'?0.95:(e.type==='cobra'?0.55:0.6);
      e.x+=e.dir*sp; if(Math.abs(e.x-e.ox)>46)e.dir*=-1;
    }else if(e.type==='ghost'){
      e.x+=e.dir*0.5; if(Math.abs(e.x-e.ox)>52)e.dir*=-1; e.y=(GROUND_Y-14)+Math.sin(e.t*0.05)*18;
    }else if(e.type==='hop'){ e.dispY=Math.sin(e.t*0.06)*4;
    }else if(e.type==='ninja'){ if(e.t%90===0&&Math.abs(e.x-head.x)<250)shots.push({x:e.x,y:e.y-4,vx:head.x<e.x?-2.5:2.5,spin:0}); }
    const ey=e.y+(e.type==='hop'?(e.dispY||0):0);
    if(Math.abs(e.x-head.x)<HEAD_R+9&&Math.abs(ey-head.y)<HEAD_R+9){
      if(head.vy>1&&head.y<ey-2){ head.y=ey-(HEAD_R+9); head.vy=key.jump?STOMP_BIG:STOMP_SMALL; e.alive=false; score+=(e.type==='hop'?30:150); sfxStomp(); }
      else hurt();
    }
  }
  for(const s of shots){ s.x+=s.vx;s.spin+=0.4;
    if(Math.abs(s.x-head.x)<HEAD_R+5&&Math.abs(s.y-head.y)<HEAD_R+5){hurt();s.dead=true;} }
  shots=shots.filter(s=>!s.dead&&s.x>camX-30&&s.x<camX+W+30);

  let spiked=false;
  for(const sp of st.spikes){
    const hit=(x,y)=>x>sp.x-4&&x<sp.x+sp.w+4&&y+SEG_R>sp.y;
    if(hit(head.x,head.y)){spiked=true;break;}
    for(let k=1;k<=segCount;k++){const t=trail[Math.min(k*SEG_SPACING,trail.length-1)];if(t&&hit(t.x,t.y)){spiked=true;break;}}
    if(spiked)break;
  }
  if(!spiked&&bossActive){
    for(const sp of bossSpikes){
      const hit=(x,y)=>x>sp.x-4&&x<sp.x+sp.w+4&&y+HEAD_R>sp.y;
      if(hit(head.x,head.y)){spiked=true;break;}
    }
  }
  if(spiked)hurt();

  if(st.gimmick==='lava_rise'&&!bossActive){
    const target=H-38; if(lavaY>target)lavaY-=0.16;
    if(head.y+HEAD_R>lavaY){fall();return;}
    rockTimer++; if(rockTimer>72){rockTimer=0;rocks.push({x:camX+60+Math.random()*(W-120),y:-10,vy:1.4+Math.random()});}
    for(const r of rocks){ r.y+=r.vy; if(Math.abs(r.x-head.x)<HEAD_R+6&&Math.abs(r.y-head.y)<HEAD_R+6){hurt();r.dead=true;} }
    rocks=rocks.filter(r=>!r.dead&&r.y<H+20);
  }

  if(st.boss&&!bossActive&&head.x>st.bossX){ startBoss(); }
  if(bossActive&&boss) updateBoss();

  camX=Math.max(0,Math.min(st.goalX-W+120,head.x-W*0.34));
  if(bossActive)camX=arenaLeft;
  if(invuln>0)invuln--;
  if(!bossActive&&head.x>=st.goalX)stageClear();
}

function bgGrad(c){const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,c[0]);g.addColorStop(1,c[1]);return g;}
function hashPixel(x,y){return Math.abs(Math.sin(x*12.9898+y*78.233+stageIdx*37.719)*43758.5453)%1;}
function drawBlockTile(x,y,w,h,p){
  ctx.fillStyle=p.base;ctx.fillRect(x,y,w,h);
  ctx.fillStyle=p.top;ctx.fillRect(x,y,w,3);
  ctx.fillStyle=p.shadow;ctx.fillRect(x,y+h-3,w,3);
  ctx.strokeStyle=p.line;ctx.lineWidth=1;ctx.strokeRect(x+.5,y+.5,w-1,h-1);
  const n=hashPixel(x,y);
  ctx.fillStyle=n>.66?p.spark:p.dot;
  ctx.fillRect(x+3+(n>.5?6:0),y+6,3,3);
  if(n>.78){ctx.fillStyle=p.line;ctx.fillRect(x+w-5,y+4,2,h-8);}
}
function drawImageCover(img, dx, dy, dw, dh, offsetX=0){
  if(!(img.complete&&img.naturalWidth))return false;
  const sw=img.naturalWidth,sh=img.naturalHeight;
  const scale=Math.max(dw/sw,dh/sh);
  const tw=sw*scale,th=sh*scale;
  let x=dx+offsetX%tw;
  if(x>dx)x-=tw;
  ctx.save();
  ctx.imageSmoothingEnabled=false;
  for(;x<dx+dw;x+=tw)ctx.drawImage(img,0,0,sw,sh,x,dy,tw,th);
  ctx.restore();
  return true;
}
function drawStage2GraveGroundSlice(x,top){
  if(!(stage2GraveGroundImg.complete&&stage2GraveGroundImg.naturalWidth))return;
  const img=stage2GraveGroundImg;
  const sw=img.naturalWidth,sh=img.naturalHeight;
  const tileWorld=520;
  const sx=Math.floor((((x%tileWorld)+tileWorld)%tileWorld)/tileWorld*sw);
  const sliceW=Math.max(1,Math.floor(sw*16/tileWorld));
  const sy=Math.floor(sh*.25);
  const sHeight=Math.floor(sh*.62);
  const drawSlice=(sourceX,sourceW,destX,destW)=>{
    ctx.drawImage(img,sourceX,sy,sourceW,sHeight,destX,top-50,destW,108);
  };
  ctx.save();
  ctx.imageSmoothingEnabled=false;
  drawSlice(sx,Math.min(sliceW,sw-sx),x,16*Math.min(sliceW,sw-sx)/sliceW);
  if(sx+sliceW>sw){
    const rem=sx+sliceW-sw;
    drawSlice(0,rem,x+16*(1-rem/sliceW),16*rem/sliceW);
  }
  ctx.restore();
}
function groundPalette(){

    {base:'#d2a15a',top:'#f0cd7a',shadow:'#a06e35',line:'#7a4f25',dot:'#fff0a0',spark:'#b98245'},

function groundFillPalette(){

function drawGroundColumn(x,top){
  const surface=groundPalette();
  const fill=groundFillPalette();
  const tile=16;
  drawBlockTile(x,top,tile,Math.min(tile,H-top),surface);
  if(stageIdx===0){
    ctx.fillStyle='#a9ee50';ctx.fillRect(x,top,16,4);
    ctx.fillStyle='#4eb43a';
    const h=4+Math.floor(hashPixel(x,top)*7);
    ctx.fillRect(x+2,top+4,3,h);ctx.fillRect(x+10,top+4,4,Math.max(3,h-2));
  }
  if(stageIdx===3){ctx.fillStyle='rgba(255,238,142,.55)';ctx.fillRect(x,top+2,16,2);}
  if(stageIdx===4){ctx.fillStyle='rgba(255,105,30,.35)';ctx.fillRect(x,top+12,16,2);}
  for(let y=top+tile;y<H;y+=tile){
    drawBlockTile(x,y,tile,Math.min(tile,H-y),fill);
    const n=hashPixel(x,y);
    if(stageIdx===0){
      if(n>.62){ctx.fillStyle='#5b351f';ctx.fillRect(x+3,y+4,9,2);}
      if(n>.82){ctx.fillStyle='#6b3b22';ctx.fillRect(x+7,y,2,10);}
    }
    if(stageIdx===1&&n>.78){ctx.fillStyle='#a6a0b8';ctx.fillRect(x+4,y+5,8,2);ctx.fillRect(x+2,y+10,5,2);}
    if(stageIdx===2&&n>.72){ctx.fillStyle='#3a2b24';ctx.fillRect(x+2,y+6,11,2);}
    if(stageIdx===3&&n>.64){ctx.fillStyle='rgba(255,235,150,.45)';ctx.fillRect(x+2,y+3,12,1);}
    if(stageIdx===4&&n>.68){ctx.fillStyle='#ff5a1f';ctx.fillRect(x+2,y+5,12,2);ctx.fillStyle='rgba(255,205,70,.45)';ctx.fillRect(x+5,y+5,4,1);}
  }
  if(stageIdx===1)drawStage2GraveGroundSlice(x,top);

function drawPlatformTile(p){

function drawPitGaps(){
  if(bossActive||!st.pits||!st.pits.length)return;
  ctx.save();
  for(const p of st.pits){
    const x=Math.floor(p.x)-2,w=Math.ceil(p.w)+4;
    const lipY=GROUND_Y;
    const darkY=GROUND_Y+18;
    const darkH=H-darkY;

    // Keep the sea/sky visible at the top of the gap, then make the lower half read as a deep pit.
    ctx.fillStyle='rgba(0,0,0,.18)';
    ctx.fillRect(x,lipY,w,8);
    ctx.fillStyle='rgba(2,7,16,.72)';
    ctx.fillRect(x,darkY,w,darkH);

    const g=ctx.createLinearGradient(0,darkY,0,H);
    if(stageIdx===0){
      g.addColorStop(0,'rgba(8,22,42,.7)');
      g.addColorStop(.48,'rgba(2,7,18,.95)');
      g.addColorStop(1,'#01030a');
    }else{
      g.addColorStop(0,'rgba(10,10,18,.78)');
      g.addColorStop(1,'rgba(0,0,0,1)');
    }
    ctx.fillStyle=g;
    ctx.fillRect(x,darkY,w,darkH);

    ctx.fillStyle='rgba(2,7,16,.55)';ctx.fillRect(x,darkY,w,2);
    ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(x,darkY+1,w,6);
    ctx.fillStyle='rgba(0,0,0,.72)';ctx.fillRect(x,lipY,6,H-lipY);ctx.fillRect(x+w-6,lipY,6,H-lipY);

    ctx.fillStyle=stageIdx===0?'rgba(4,9,20,.96)':'rgba(0,0,0,.98)';
    for(let sx=x+4;sx<x+w-3;sx+=9){
      ctx.beginPath();ctx.moveTo(sx,H);ctx.lineTo(sx+4,H-14);ctx.lineTo(sx+8,H);ctx.closePath();ctx.fill();
    }
  }
  ctx.restore();
}

function draw(){
  drawStageBackground();
  ctx.save();ctx.translate(-camX,0);
  drawPitGaps();
  for(let x=Math.floor(camX/16)*16;x<camX+W+16;x+=16){
    if(!overGround(x+8))continue;
    drawGroundColumn(x,groundTop(x+8));
  }
  if(!bossActive)for(const c of st.cps){ if(c<=60)continue; const ty=groundTop(c);
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillRect(c,ty-30,2,30);
    ctx.fillStyle=c<=lastCPx?'#5ad85a':'rgba(255,255,255,.4)';ctx.fillRect(c+2,ty-30,12,8);}

  }

  if(bossActive)for(const sp of bossSpikes){ctx.fillStyle='#cfd2d8';
    for(let x=sp.x;x<sp.x+sp.w;x+=8){ctx.beginPath();ctx.moveTo(x,sp.y+12);ctx.lineTo(x+4,sp.y);ctx.lineTo(x+8,sp.y+12);ctx.closePath();ctx.fill();}
    ctx.fillStyle='rgba(255,255,255,.38)';ctx.fillRect(sp.x+2,sp.y+9,Math.max(4,sp.w-4),2);}
  if(!bossActive){
    const gy=groundTop(st.goalX);
    ctx.fillStyle='#ffffff';ctx.fillRect(st.goalX,gy-52,3,52);ctx.fillRect(st.goalX-2,gy-54,7,4);
    ctx.fillStyle='#000';ctx.beginPath();ctx.moveTo(st.goalX+3,gy-50);ctx.lineTo(st.goalX+27,gy-42);ctx.lineTo(st.goalX+3,gy-34);ctx.closePath();ctx.fill();
    ctx.fillStyle='#5ad85a';ctx.beginPath();ctx.moveTo(st.goalX+3,gy-48);ctx.lineTo(st.goalX+23,gy-42);ctx.lineTo(st.goalX+3,gy-36);ctx.closePath();ctx.fill();
  }
  if(bossActive){ ctx.fillStyle='#2a120c'; ctx.fillRect(rightWall+HEAD_R,0,W,H); ctx.fillStyle='#1a0a06'; for(let y=0;y<H;y+=16)ctx.fillRect(rightWall+HEAD_R,y,8,8); }
  ctx.textAlign='center';
  for(const m of mice){ if(m.got)continue; drawMouse(m); }
  if(!bossActive)for(const e of ents){ if(!e.alive)continue;
    const ey=e.y+(e.type==='hop'?(e.dispY||0):0);
    drawEnemy(e,ey);}
  if(bossActive&&boss){
    if(boss.low){ctx.fillStyle='rgba(255,180,80,.4)';ctx.fillRect(boss.x-36,boss.y-58,72,96);}
    if(!(boss.iframe>0&&Math.floor(boss.iframe/4)%2)){
      ctx.save();ctx.translate(boss.x,boss.y+8);
      if(bossDragonImg.complete&&bossDragonImg.naturalWidth){
        ctx.drawImage(bossDragonImg,-58,-78,116,142);
      }else{
        ctx.fillStyle='#1d7c35';
        ctx.fillRect(-32,-42,64,78);
        ctx.fillStyle='#f2c14e';
        ctx.fillRect(-28,-48,10,12);
        ctx.fillRect(18,-48,10,12);
      }
      ctx.restore();
    }
    if(boss.dead){ctx.font='30px serif';ctx.fillText('\uD83D\uDCA5',boss.x,boss.y+10);}
    ctx.font='18px serif';
    for(const f of fires)ctx.fillText('\uD83D\uDD25',f.x,f.y+6);
  }
  ctx.fillStyle='#e8eef2';for(const s of shots){ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.spin);ctx.fillRect(-5,-1.5,10,3);ctx.fillRect(-1.5,-5,3,10);ctx.restore();}
  ctx.fillStyle='#7a3a28';for(const r of rocks){ctx.beginPath();ctx.arc(r.x,r.y,5,0,6.28);ctx.fill();}
  const segCount=BASE_SEG+eaten;
  for(let k=segCount;k>=1;k--){const t=trail[Math.min(k*SEG_SPACING,trail.length-1)];if(!t)continue;
    drawSnakeBodySegment(t,k);}
  if(!(invuln>0&&Math.floor(invuln/4)%2)){
    drawSnakeHead();}
  if(st.gimmick==='lava_rise'&&lavaY<H){
    const g=ctx.createLinearGradient(0,lavaY,0,H);g.addColorStop(0,'#ffcb3a');g.addColorStop(.4,'#ff6a1a');g.addColorStop(1,'#9a1a0a');
    ctx.fillStyle=g;ctx.fillRect(camX,lavaY,W,H-lavaY);
    ctx.fillStyle='rgba(255,220,120,.5)';for(let x=camX;x<camX+W;x+=20)ctx.fillRect(x+(performance.now()/200%20),lavaY-2,8,3);}
  ctx.restore();
  drawHUD();
  if(deathPauseMs>0){
    const fade=Math.min(1,1-(deathPauseMs/DEATH_PAUSE_TOTAL_MS));
    ctx.fillStyle='rgba(0,0,0,'+(0.28+0.5*fade).toFixed(3)+')';
    ctx.fillRect(0,0,W,H);
  }
}

function drawMouse(m){
  const img=mouseImgs[m.variant%mouseImgs.length];
  const y=m.y+Math.sin(m.bob)*2;
  if(img&&img.complete&&img.naturalWidth){
    const aspect=img.naturalWidth/img.naturalHeight;
    let w=30,h=30/aspect;
    if(h>24){h=24;w=h*aspect;}
    ctx.drawImage(img,m.x-w/2,y-h/2,w,h);
  }else{
    ctx.font='14px serif';
    ctx.fillText('\uD83D\uDC2D',m.x,y+5);
  }
}

function drawEnemy(e,ey){
  const art=e.art&&enemyArtImgs[e.art];
  if(art&&art.img.complete&&art.img.naturalWidth){
    const {img,w,h}=art;
    if(e.type==='hop'||e.type==='ghost'){
      ctx.fillStyle='rgba(0,0,0,.16)';
      ctx.fillRect(e.x-w*.28,ey+7,w*.56,3);
    }
    ctx.save();
    ctx.imageSmoothingEnabled=false;
    if(e.dir>0&&e.type!=='hop'&&e.type!=='ghost'){
      ctx.translate(e.x,ey);
      ctx.scale(-1,1);
      ctx.drawImage(img,-w/2,-h+8,w,h);
    }else{
      ctx.drawImage(img,e.x-w/2,ey-h+8,w,h);
    }
    ctx.restore();
    return;
  }
  ctx.font='15px serif';
  const em=e.em||ENEMY_FALLBACK[e.type]||'\uD83D\uDFEA';
  if(e.type==='hop'){
    ctx.fillStyle='rgba(0,0,0,.18)';
    ctx.fillRect(e.x-9,ey+7,18,3);
  }
  ctx.fillText(em,e.x,ey+5);
}

function drawSnakeHead(){
  if(snakeHeadImg.complete&&snakeHeadImg.naturalWidth){
    const w=HEAD_R*3.1,h=HEAD_R*2.8;
    ctx.save();
    ctx.translate(head.x,head.y-1);
    ctx.scale(head.face,1);
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(snakeHeadImg,-w*.47,-h*.5,w,h);
    ctx.restore();
    return;
  }
  ctx.fillStyle='#e8843a';ctx.beginPath();ctx.arc(head.x,head.y,HEAD_R,0,6.28);ctx.fill();
  ctx.fillStyle='#c8492c';ctx.fillRect(head.x-7,head.y-8,14,4);
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(head.x+head.face*3,head.y-2,2.4,0,6.28);ctx.fill();
  ctx.fillStyle='#000';ctx.beginPath();ctx.arc(head.x+head.face*4,head.y-2,1.2,0,6.28);ctx.fill();
  ctx.strokeStyle='#c8492c';ctx.lineWidth=1.4;ctx.beginPath();ctx.moveTo(head.x+head.face*8,head.y+1);ctx.lineTo(head.x+head.face*14,head.y+1);ctx.stroke();
}

function drawSnakeBodySegment(t,k){
  if(snakeBodyImg.complete&&snakeBodyImg.naturalWidth){
    const size=SEG_R*2.35;
    ctx.save();
    ctx.translate(t.x,t.y);
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(snakeBodyImg,-size*.5,-size*.5,size,size);
    ctx.restore();
    return;
  }
  ctx.fillStyle=(k%2===0)?'#c8492c':'#e8843a';ctx.beginPath();ctx.arc(t.x,t.y,SEG_R,0,6.28);ctx.fill();
}

function drawStage1PixelSky(){
  ctx.save();
  ctx.imageSmoothingEnabled=false;
  if(stage1UserSkyImg.complete&&stage1UserSkyImg.naturalWidth){
    const sw=stage1UserSkyImg.naturalWidth,sh=stage1UserSkyImg.naturalHeight;
    const dh=150;
    ctx.drawImage(stage1UserSkyImg,0,0,sw,sh,0,0,W,dh);
    const fade=ctx.createLinearGradient(0,dh-28,0,dh+10);
    fade.addColorStop(0,'rgba(130,198,238,0)');
    fade.addColorStop(1,'rgba(218,244,255,.5)');
    ctx.fillStyle=fade;ctx.fillRect(0,dh-28,W,40);
  }else{
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#55a7ed');
    g.addColorStop(.66,'#9ed9f6');
    g.addColorStop(1,'#e3f7ff');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  }
  ctx.restore();
  drawStage1SeaWash();
}
function drawPixelCloud(x,y,s,a){
  ctx.save();ctx.globalAlpha=a;ctx.fillStyle='#f5f9ff';
  const blocks=[[0,2,7,1],[1,1,5,1],[2,0,3,1],[7,2,4,1],[2,3,10,1],[5,1,3,1]];
  for(const b of blocks)ctx.fillRect(x+b[0]*8*s,y+b[1]*8*s,b[2]*8*s,b[3]*8*s);
  ctx.fillStyle='rgba(190,215,255,.46)';ctx.fillRect(x+8*s,y+3*8*s,10*8*s,4*s);
  ctx.restore();
}
function drawStage1SeaWash(){
  const y0=124;
  const h=GROUND_Y-y0+10;
  ctx.save();
  ctx.imageSmoothingEnabled=false;
  if(stage1SeaWashImg.complete&&stage1SeaWashImg.naturalWidth){
    ctx.globalAlpha=.92;
    const sw=stage1SeaWashImg.naturalWidth, sh=stage1SeaWashImg.naturalHeight;
    const sy=Math.floor(sh*.56);
    const sHeight=sh-sy;
    ctx.drawImage(stage1SeaWashImg,0,sy,sw,sHeight,0,y0,W,h);
    const fade=ctx.createLinearGradient(0,y0-18,0,y0+22);
    fade.addColorStop(0,'rgba(233,248,255,0)');
    fade.addColorStop(1,'rgba(233,248,255,.42)');
    ctx.fillStyle=fade;ctx.fillRect(0,y0-18,W,44);
  }else{
    const sea=ctx.createLinearGradient(0,y0,0,GROUND_Y+8);
    sea.addColorStop(0,'rgba(116,205,239,.22)');
    sea.addColorStop(1,'rgba(42,139,196,.4)');
    ctx.fillStyle=sea;ctx.fillRect(0,y0,W,h);
  }
  ctx.restore();
}
function drawStageBackground(){
  if(stageIdx===0){drawStage1PixelSky();return;}
  if(stageIdx===1){
    ctx.fillStyle=bgGrad(st.sky);ctx.fillRect(0,0,W,H);
    drawImageCover(stage2SpaceSkyImg,0,0,W,H,-camX*.018);
    ctx.fillStyle='rgba(0,0,0,.22)';
    ctx.fillRect(0,0,W,H);
    return;
  }
  if(stageIdx===2){
    ctx.fillStyle=bgGrad(st.sky);ctx.fillRect(0,0,W,H);
    drawImageCover(stage3SunsetSkyImg,0,0,W,H,-camX*.018);
    drawImageCover(stage3VillageFrontImg,0,34,W,H,-camX*.16);
    ctx.fillStyle='rgba(0,0,0,.16)';
    ctx.fillRect(0,0,W,H);
    return;
  }
  if(stageIdx===3){
    ctx.fillStyle=bgGrad(st.sky);ctx.fillRect(0,0,W,H);
    drawImageCover(stage4SunsetSkyImg,0,0,W,H,-camX*.018);
    drawImageCover(stage4DesertFrontImg,0,24,W,H,-camX*.13);
    ctx.fillStyle='rgba(0,0,0,.12)';
    ctx.fillRect(0,0,W,H);
    return;
  }
  ctx.fillStyle=bgGrad(st.sky);ctx.fillRect(0,0,W,H);
  const imgs=stageBgImgs[stageIdx];
  if(!imgs.every(img=>img.complete&&img.naturalWidth)){drawDeco();return;}
  ctx.imageSmoothingEnabled=false;
  for(const layer of BG_LAYERS[stageIdx]) drawParallaxLayer(imgs[BG_LAYER_NAMES.indexOf(layer.name)],layer);
  ctx.fillStyle='rgba(0,0,0,.12)';
  ctx.fillRect(0,0,W,H);
}

function drawParallaxLayer(img,layer){
  const tileW=img.naturalWidth*H/img.naturalHeight;
  let x=-(camX*layer.speed%tileW);
  if(x>0)x-=tileW;
  ctx.save();
  ctx.globalAlpha=layer.alpha;
  for(;x<W;x+=tileW){
    ctx.drawImage(img,x,0,tileW,H);
  }
  ctx.restore();
}

function drawDeco(){
  ctx.save();const p=-camX*0.3;
  if(st.deco==='cloud'){ctx.fillStyle='rgba(255,255,255,.85)';
    for(let i=0;i<6;i++){const x=((i*180+p)%(W+120))-60;ctx.beginPath();ctx.arc(x,50+i%2*30,16,0,6.28);ctx.arc(x+16,50+i%2*30,20,0,6.28);ctx.arc(x+34,50+i%2*30,15,0,6.28);ctx.fill();}}
  if(st.deco==='grave'){ctx.fillStyle='rgba(255,255,240,.9)';ctx.beginPath();ctx.arc(W-70,45,18,0,6.28);ctx.fill();
    ctx.fillStyle='rgba(60,52,90,.6)';for(let i=0;i<5;i++){const x=((i*150+p)%(W+100))-50;ctx.fillRect(x,150,20,40);ctx.fillRect(x-4,150,28,8);}}
  if(st.deco==='castle'){ctx.fillStyle='rgba(40,20,30,.5)';for(let i=0;i<4;i++){const x=((i*200+p)%(W+160))-80;ctx.fillRect(x,90,90,120);for(let j=0;j<5;j++)ctx.fillRect(x+j*20,80,12,12);}}
  if(st.deco==='pyramid'){ctx.fillStyle='rgba(180,130,60,.5)';for(let i=0;i<3;i++){const x=((i*260+p)%(W+220))-110;ctx.beginPath();ctx.moveTo(x,200);ctx.lineTo(x+70,90);ctx.lineTo(x+140,200);ctx.closePath();ctx.fill();}}
  if(st.deco==='volcano'){ctx.fillStyle='rgba(20,8,6,.6)';for(let i=0;i<2;i++){const x=((i*320+p)%(W+260))-130;ctx.beginPath();ctx.moveTo(x,210);ctx.lineTo(x+90,70);ctx.lineTo(x+180,210);ctx.closePath();ctx.fill();}
    ctx.fillStyle='rgba(255,120,40,.3)';for(let i=0;i<10;i++)ctx.fillRect(80+i*40,(performance.now()/30+i*30)%H,3,3);}
  ctx.restore();
}
function drawHUD(){
  ctx.textAlign='left';ctx.font='9px "Press Start 2P",monospace';ctx.fillStyle='#fff';
  ctx.fillText('SCORE '+String(score).padStart(5,'0'),42,16);
  ctx.fillText('\uD83D\uDC2D'+eaten+' ('+feed+'/'+FEED_HEAL+')',42,30);
  ctx.fillText(bossActive?'BOSS':st.name,W/2-30,16);
  ctx.textAlign='right';
  ctx.fillStyle='#ffd24a';ctx.fillText('STA '+'\u25C6'.repeat(Math.max(0,stamina)),W-8,16);
  ctx.fillStyle='#ff7a7a';ctx.fillText('\u2665 x'+Math.max(0,lives),W-8,30);
  if(bossActive&&boss&&!boss.dead){
    ctx.textAlign='center';ctx.fillStyle='#fff';ctx.font='8px "Press Start 2P",monospace';
    ctx.fillText('DRAGON',W/2,H-26);
    const bw=120,bx=W/2-bw/2,by=H-20;
    ctx.fillStyle='#3a1010';ctx.fillRect(bx,by,bw,8);
    ctx.fillStyle='#ff3a2a';ctx.fillRect(bx,by,bw*Math.max(0,boss.hp)/BOSS_HP,8);
    ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,8);
  }
}

function stopEndMedia(){
  clearVideo.pause();
  clearVideo.currentTime=0;
}
function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}
function showEndScreen(mode, detail){
  stopEndMedia();
  if(mode==='clear'){
    endBadgeTitle.textContent='ALL CLEAR';
    endTitle.textContent='ALL CLEAR!';
    endTitle.style.color='#ffd24a';
    endMsg.innerHTML='\uD83D\uDC09 ドラゴン撃破！<br>エンドカードを再生中。<br>SCORE '+score+' ／ \uD83D\uDC2D'+eaten;
    deathPortrait.classList.add('hidden');
    clearVideo.classList.remove('hidden');
    clearVideo.currentTime=0;
    clearVideo.play().catch(()=>{});
    bgmPlay('clear');
  }else{
    endBadgeTitle.textContent='GAME OVER';
    endTitle.textContent='GAME OVER';
    endTitle.style.color='#e8843a';
    endMsg.innerHTML='SCORE '+score+' ／ \uD83D\uDC2D'+eaten+'<br>'+(detail||'STAGE '+(stageIdx+1));
    clearVideo.classList.add('hidden');
    deathPortrait.classList.remove('hidden');
    const pick=deathPortraits[Math.floor(Math.random()*deathPortraits.length)];
    deathPortrait.src=asset(pick);
  }
  show('endScreen');
}
function startGame(){audioInit();audioResume();stageIdx=0;score=0;eaten=0;lives=3;feed=0;deathPauseMs=0;loadStage(0);hide('titleScreen');hide('interScreen');hide('endScreen');stopEndMedia();deathPortrait.classList.remove('hidden');running=true;playStageBgm();}
function stageClear(){running=false; bgmStop(); sfxClear();
  deathPauseMs=0;
  if(stageIdx>=STAGES.length-1){
    showEndScreen('clear');
  }else{
    const nx=STAGES[stageIdx+1];
    document.getElementById('interTitle').textContent='STAGE CLEAR';
    document.getElementById('interSub').innerHTML='NEXT &rarr;<br>'+nx.sub+'<br><br>スタミナ全回復！';
    show('interScreen');
  }
}
function gameOver(){running=false; bgmStop(); sfxOver();
  deathPauseMs=0;
  showEndScreen('gameover',bossActive?'BOSS戦':'STAGE '+(stageIdx+1));}

document.getElementById('startBtn').onclick=startGame;
document.getElementById('againBtn').onclick=startGame;
document.getElementById('nextBtn').onclick=()=>{stageIdx++;loadStage(stageIdx);hide('interScreen');running=true;playStageBgm();};

loadStage(0);
let lastFrameTime=0, updateLag=0;
function loop(now=0){
  if(!lastFrameTime)lastFrameTime=now;
  const elapsed=Math.min(100,now-lastFrameTime);
  lastFrameTime=now;
  if(deathPauseMs>0){
    deathPauseMs=Math.max(0,deathPauseMs-elapsed);
    updateLag=0;
    if(deathPauseMs===0){
      respawn();
      running=true;
    }
  }else{
    updateLag+=elapsed;
    let steps=0;
    while(updateLag>=UPDATE_STEP_MS&&steps<MAX_UPDATE_STEPS){
      update();
      updateLag-=UPDATE_STEP_MS;
      steps++;
    }
    if(steps>=MAX_UPDATE_STEPS)updateLag=0;
  }
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
